name: Daily OSS Fixer

on:
  workflow_dispatch:
  schedule:
    # 09:00 Asia/Shanghai == 01:00 UTC
    - cron: "0 1 * * *"

permissions:
  contents: read
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Agent
        id: run_agent
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.OSS_FIXER_GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          oss-fixer run-once --config config/repos.yaml --max-prs 10

      - name: Build PR Report
        id: report
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.OSS_FIXER_GH_TOKEN }}
        run: |
          mkdir -p reports
          python tools/report_daily_prs.py \
            --config config/repos.yaml \
            --window-hours 24 \
            --output reports/daily_pr_report.md \
            --json-output reports/daily_pr_report.json

      - name: Publish Report To Summary
        if: always()
        run: |
          cat reports/daily_pr_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-pr-report
          path: reports/

      - name: Check Daily Target
        id: pr_target
        if: always()
        run: |
          python tools/check_pr_target.py \
            --config config/repos.yaml \
            --report-json reports/daily_pr_report.json

      - name: Alert By Issue
        if: always() && (steps.run_agent.outcome == 'failure' || steps.pr_target.outcome == 'failure')
        uses: actions/github-script@v7
        env:
          RUN_AGENT_OUTCOME: ${{ steps.run_agent.outcome }}
          PR_TARGET_OUTCOME: ${{ steps.pr_target.outcome }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[ALERT] Daily OSS fixer failed or target missed (${new Date().toISOString().slice(0,10)})`;
            const body = [
              "Daily OSS fixer run requires attention.",
              "",
              `- run agent outcome: ${process.env.RUN_AGENT_OUTCOME}`,
              `- target check outcome: ${process.env.PR_TARGET_OUTCOME}`,
              `- run url: ${runUrl}`,
              "",
              "Please inspect workflow logs and reports artifact.",
            ].join("\n");
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["alert"],
              });
            }

      - name: Alert By Slack (Optional)
        if: always() && (steps.run_agent.outcome == 'failure' || steps.pr_target.outcome == 'failure') && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "Daily OSS fixer alert: failed run or PR target missed. Check Actions logs."
          }
          JSON
          )
          curl -X POST -H "Content-type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
