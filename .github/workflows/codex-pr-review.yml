name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          !github.event.pull_request.draft &&
          (
            (
              github.event_name == 'pull_request' &&
              github.event.pull_request.head.repo.full_name == github.repository
            ) ||
            (
              github.event_name == 'pull_request_target' &&
              github.event.pull_request.head.repo.full_name != github.repository
            )
          )
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.pull_request.base.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate Codex review comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          AI_REVIEW_PROVIDER: openai
          AI_REVIEW_MARKER: "<!-- oss-aie-codex-review -->"
          AI_REVIEW_HEADING: "Codex AI Code Review"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_REVIEW_MODEL }}
        run: python tools/ai_pr_review.py
